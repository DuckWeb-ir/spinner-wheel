<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f11" />
      <stop offset="100%" stop-color="#030303" />
    </linearGradient>
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
    <!-- Inner Wheel Gradient -->
    <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- App Rounded Background Shadow and Shape -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bgGrad)" stroke="#27272a" stroke-width="6" />

  <!-- Outer Ring (Glow) -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#accentGrad)" stroke-width="4" filter="url(#glow)" opacity="0.6" />
  
  <g transform="translate(256, 256)">
    <!-- Base Spinner Wheel -->
    <circle cx="0" cy="0" r="150" fill="url(#wheelGrad)" stroke="url(#accentGrad)" stroke-width="8" />

    <!-- Wheel Slices (drawn as paths) -->
    <!-- Segment 1: Orange -->
    <path d="M 0 0 L 0 -150 A 150 150 0 0 1 130 -75 Z" fill="#ea580c" opacity="0.85" />
    <!-- Segment 2: Amber -->
    <path d="M 0 0 L 130 -75 A 150 150 0 0 1 130 75 Z" fill="#d97706" opacity="0.85" />
    <!-- Segment 3: Yellow -->
    <path d="M 0 0 L 130 75 A 150 150 0 0 1 0 150 Z" fill="#ca8a04" opacity="0.85" />
    <!-- Segment 4: Indigo -->
    <path d="M 0 0 L 0 150 A 150 150 0 0 1 -130 75 Z" fill="#4f46e5" opacity="0.85" />
    <!-- Segment 5: Dark Indigo -->
    <path d="M 0 0 L -130 75 A 150 150 0 0 1 -130 -75 Z" fill="#3730a3" opacity="0.85" />
    <!-- Segment 6: Dark Amber -->
    <path d="M 0 0 L -130 -75 A 150 150 0 0 1 0 -150 Z" fill="#b45309" opacity="0.85" />

    <!-- Center Cap -->
    <circle cx="0" cy="0" r="35" fill="#0f172a" stroke="url(#accentGrad)" stroke-width="6" />
    <circle cx="0" cy="0" r="12" fill="#ffffff" />

    <!-- Pointer Arrow pointing downwards -->
    <path d="M 0 -170 L 15 -140 L -15 -140 Z" fill="url(#accentGrad)" filter="url(#glow)" />
    <!-- Little Sparkles around -->
    <circle cx="-80" cy="-80" r="8" fill="#f59e0b" />
    <circle cx="80" cy="80" r="6" fill="#f59e0b" />
  </g>
</svg>
